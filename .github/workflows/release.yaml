name: Release tvm-cli

on:
  push:
    # NOTE: if tag has -rc or -rc<digit> in it, it will be considered a release candidate
    # and will trigger prerelease true
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.an'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.an'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+.an'
      - 'v[0-9]+.[0-9]+.[0-9]+*-auto*'
      - '*.an'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: macos-arm64
            target: aarch64-apple-darwin
            os: macos-15
            zigbuild: false

          # - suffix: macos-amd64
          #   target: x86_64-apple-darwin
          #   os: macos-13
          #   zigbuild: false

          - suffix: linux-musl-arm64
            target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            zigbuild: true

          - suffix: linux-musl-amd64
            target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            zigbuild: true

          - suffix: arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            zigbuild: false

          - suffix: x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            zigbuild: false

    name: Build ${{ matrix.target }}

    env:
      CARGO_TERM_COLOR: always
      SCCACHE_GHA_VERSION: ${{ vars.SCCACHE_GHA_VERSION || 1 }}
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set VERSION
        id: version
        run: |
          echo "VERSION=$(cat version.json | jq -r .version)" >> "$GITHUB_OUTPUT"

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: builder-${{ runner.os }}-cargo

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux tools
        if: startsWith(matrix.os, 'ubuntu-')
        env:
          packages: >-
            build-essential
            cmake
            curl
            jq
            clang
            librocksdb-dev
            protobuf-compiler
            python3-pip
        run: |
          sudo apt update -yq
          sudo apt install -yq $packages
          pip3 install ziglang
          [[ -f ~/.cargo/bin/cargo-zigbuild ]] || cargo install cargo-zigbuild

      - name: Install MacOS tools
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew install protobuf jq

      - name: Build Binary
        env:
          CARGO_INCREMENTAL: 0
          CARGO_NET_RETRY: 10
          RUST_BACKTRACE: full
          RUSTUP_MAX_RETRIES: 10
        run: |
          cargo update

          for binary in tvm-cli tvm-debugger; do
            if [[ "${{ matrix.zigbuild }}" == "true" ]]; then
              cargo zigbuild -r --target ${{ matrix.target }} --bin "$binary"
            else
              cargo build -r --target ${{ matrix.target }} --bin "$binary"
            fi
          done
          ls -lA target/${{ matrix.target }}/release

      - name: List all binaries
        run: |
          mkdir artifacts-${{ matrix.suffix }}

          for binary in tvm-cli tvm-debugger; do
            mv target/${{ matrix.target }}/release/$binary artifacts-${{ matrix.suffix }}/$binary
          done
          ls -lA artifacts-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: artifacts-${{ matrix.suffix }}/*
          name: artifacts-${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 3

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

  release:
    needs:
      - build
    runs-on: ubuntu-latest

    env:
      SUFFIXES: macos-arm64 linux-musl-arm64 linux-musl-amd64 arm64 x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure of downloaded files
        run: ls -R

      - name: Make archives
        run: |
          set -e
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          for suffix in $SUFFIXES; do
            chmod +x artifacts-"$suffix"/*
            cd artifacts-"$suffix"
            for file in *; do
              tar -czvf "$file"-"$version"-"$suffix".tar.gz $file
            done
            cd ..
            ls -lA artifacts-"$suffix"
          done

      - name: Set prerelease flag
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.an$ ]]; then
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.prerelease.outputs.TITLE }}
          PRERELEASE: ${{ steps.prerelease.outputs.PRERELEASE }}
        run: |
          TITLE="Version: ${{ github.ref_name }}"
          EXISTS=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --silent && echo "true" || echo "false")

          if [[ "$EXISTS" = "false" ]]; then
            if [[ "$PRERELEASE" = "false" ]]; then
              gh release create "${{ github.ref_name }}" --title "$TITLE"
            else
              gh release create "${{ github.ref_name }}" --title "$TITLE" --prerelease
            fi
          fi

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts-*/**.tar.gz \
            --clobber

  trigger-acki-nacki:
    needs:
      - release
    if: contains(github.ref_name, '-auto')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Trigger downstream pipeline
        env:
          WOODPECKER_HOST: ${{ secrets.WOODPECKER_HOST }}
          WOODPECKER_TOKEN: ${{ secrets.WOODPECKER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          version="${TAG%%-*}"
          test_branch="${version}-rc.an-release-testing"

          compare_status=$(gh api "repos/$REPO/compare/main...$SHA" -q .status)
          if [[ "$compare_status" == "identical" || "$compare_status" == "behind" ]]; then
            pr_state=merged
            msg=$(gh api "repos/$REPO/commits/main" -q '.commit.message' | head -1)
            pr=$(printf '%s' "$msg" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
            pr_numbers=()
            [[ -n "$pr" ]] && pr_numbers+=("$pr")
          else
            pr_state=open
            mapfile -t head_branches < <(gh api "repos/$REPO/commits/$SHA/branches-where-head" -q '.[].name')
            pr_numbers=()
            repo_owner="${REPO%%/*}"
            for head_branch in "${head_branches[@]}"; do
              mapfile -t branch_pr_numbers < <(gh api --method GET "repos/$REPO/pulls" \
                -f state=open \
                -f base=main \
                -f "head=${repo_owner}:${head_branch}" \
                -q '.[].number')
              pr_numbers+=("${branch_pr_numbers[@]}")
            done

            if [[ ${#pr_numbers[@]} -gt 1 ]]; then
              echo "ERROR: multiple open PRs to main found for $SHA: ${pr_numbers[*]}" >&2
              exit 1
            fi

            if [[ ${#pr_numbers[@]} -eq 0 ]]; then
              if [[ ${#head_branches[@]} -eq 0 ]]; then
                echo "ERROR: no branch has $SHA as HEAD; cannot auto-create PR" >&2
                exit 1
              fi
              if [[ ${#head_branches[@]} -gt 1 ]]; then
                echo "ERROR: multiple branches have $SHA as HEAD: ${head_branches[*]}" >&2
                exit 1
              fi
              head_branch="${head_branches[0]}"
              new_pr_url=$(gh pr create \
                --repo "$REPO" \
                --base main \
                --head "$head_branch" \
                --assignee "$ACTOR" \
                --title "Pre-release tvm-sdk $TAG" \
                --body "Auto-created by release workflow for tag \`$TAG\` (pushed by @$ACTOR).")
              pr_numbers=("${new_pr_url##*/}")
            fi
          fi

          if [[ ${#pr_numbers[@]} -eq 0 ]]; then
            echo "No tvm-sdk PR resolved for state=$pr_state; skipping downstream trigger."
            exit 0
          fi

          for pr_number in "${pr_numbers[@]}"; do
            payload=$(jq -n \
              --arg tb "$test_branch" \
              --arg t "$TAG" \
              --arg a "$ACTOR" \
              --arg pr "$pr_number" \
              --arg url "https://github.com/$REPO/pull/$pr_number" \
              --arg s "$pr_state" \
              '{branch: "dev", variables: {
                  test_branch: $tb,
                  tag: $t,
                  actor: $a,
                  tvm_sdk_pr: $pr,
                  tvm_sdk_pr_url: $url,
                  tvm_sdk_pr_state: $s
                }}')

            curl -fsS -X POST \
              -H "Authorization: Bearer ${WOODPECKER_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              -o /dev/null -w "PR=$pr_number state=$pr_state HTTP %{http_code}\n" \
              "${WOODPECKER_HOST}"
          done
